name: Build Electron App

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install ddddocr

      - name: Install Node deps
        run: npm install

      - name: Build TypeScript
        run: npm run build

      - name: Package Electron (portable + nsis)
        run: npm run electron:build:all

      - name: Split artifacts
        run: |
          New-Item -ItemType Directory -Force -Path dist-portable, dist-nsis
          Get-ChildItem -Path release -Filter "*.exe" | Where-Object { $_.Name -match "Setup" } | Copy-Item -Destination dist-nsis
          Get-ChildItem -Path release -Filter "*.exe" | Where-Object { $_.Name -notmatch "Setup" } | Copy-Item -Destination dist-portable

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: bzxz-portable-win
          path: dist-portable/

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: bzxz-nsis-win
          path: dist-nsis/
